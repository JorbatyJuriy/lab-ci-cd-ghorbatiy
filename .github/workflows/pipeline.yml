name: Lab 3 CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # Stage 1: Validation (Тести, Лінтер, Безпека)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run Unit Tests
        run: go test -v -coverprofile=coverage.out ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

      - name: Run Security Scan (gosec)
        uses: securego/gosec@master
        with:
          args: ./...

  # Stage 2: Build
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Binary
        run: go build -o myapp main.go
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-binary
          path: myapp

  # Stage 3: Deploy to Staging
  deploy_staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-binary
      - name: Simulate Staging Deploy
        run: |
          chmod +x myapp
          echo "Executing application on Staging..."
          ./myapp || echo "App placeholder executed"

  # Stage 4: Verify Staging (Smoke Test)
  verify_staging:
    needs: deploy_staging
    runs-on: ubuntu-latest
    steps:
      - name: Smoke Test
        run: |
          echo "Verifying deployment (1=1 check)..."
          if [ 1 -eq 1 ]; then exit 0; else exit 1; fi

  # Stage 5: Deploy to Production (З Manual Approval)
  deploy_production:
    needs: verify_staging
    runs-on: ubuntu-latest
    # Цей рядок прив'язує етап до ручного підтвердження в GitHub
    environment: production
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-binary
      - name: Final Production Deployment
        run: |
          echo "Final release to Production environment"
          ls -l myapp