name: Lab 3 CI-CD

on:
  push:
    branches: [ main ]

jobs:
  # Stage 1: Validation (Test, Lint, Security)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true # Вмикаємо кешування для швидкості

      # Unit Tests + Coverage
      - name: Run Tests with Coverage
        run: |
          go test -v -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      # Lintering
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest

      # Security Scan
      - name: Run Security Scan (gosec)
        uses: securego/gosec-action@v2.1.8
        with:
          args: ./...

  # Stage 2: Build
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Binary
        run: go build -o myapp main.go
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-binary
          path: myapp

  # Stage 3: Deploy to Staging
  deploy_staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-binary
      - name: Use Artifact
        run: |
          chmod +x myapp
          ./myapp || echo "App logic executed"

  # Stage 4: Verify Staging
  verify_staging:
    needs: deploy_staging
    runs-on: ubuntu-latest
    steps:
      - name: Smoke Test
        run: |
          if [ 1 -eq 1 ]; then exit 0; else exit 1; fi

  # Stage 5: Deploy to Production
  deploy_production:
    needs: verify_staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-binary
      - name: Production Deployment
        run: ls -l myapp